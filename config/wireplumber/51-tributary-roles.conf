# WirePlumber 0.5.x SPA-JSON drop-in. Place in ~/.config/wireplumber/wireplumber.conf.d/.
# WirePlumber 0.4.x equivalent is Lua at ~/.config/wireplumber/bluetooth.lua.d/51-tributary-roles.lua
# (bluez_monitor.properties table with the same keys).
# One radio carries both A2DP roles, so sink and source are enabled together.

monitor.bluez.properties = {
  bluez5.roles = [ a2dp_sink a2dp_source bap_sink bap_source hfp_hf hfp_ag ]
  bluez5.codecs = [ sbc sbc_xq aac aptx aptx_hd aptx_ll ldac lc3 ]
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  bluez5.enable-hw-volume = true
}
